services:
  postgres:
    image: postgres:16-alpine
    container_name: ctis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ctis_okx}
      POSTGRES_USER: ${POSTGRES_USER:-ctis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctis_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ctis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ctis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ctis_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ctis_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ctis_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ctis}:${POSTGRES_PASSWORD:-ctis_secret}@postgres:5432/${POSTGRES_DB:-ctis_okx}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ctis_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn core.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2 --timeout 120"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ctis_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ctis}:${POSTGRES_PASSWORD:-ctis_secret}@postgres:5432/${POSTGRES_DB:-ctis_okx}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ctis_network
    command: celery -A core worker -l INFO --concurrency=4 -Q scanner,signals,alerts

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ctis_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ctis}:${POSTGRES_PASSWORD:-ctis_secret}@postgres:5432/${POSTGRES_DB:-ctis_okx}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ctis_network
    command: celery -A core beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ctis_frontend
    restart: unless-stopped
    networks:
      - ctis_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ctis_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ctis_network

volumes:
  postgres_data:
  redis_data:
  static_files:

networks:
  ctis_network:
    driver: bridge
